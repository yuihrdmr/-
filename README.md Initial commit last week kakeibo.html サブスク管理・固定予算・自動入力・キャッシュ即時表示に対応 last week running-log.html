<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f3a5f">
<title>株ウォッチリスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* 紙っぽい背景 ＋ 濃紺 ＋ アクセント（ランニングログと共通のトーン） */
    --bg:#f3ede1; --card:#fffdf7; --ink:#16243f; --sub:#6c7689;
    --line:#ece4d4;
    --navy:#1f3a5f; --navy-d:#15294a; --navy-l:#2f4f7a; --navy-xl:#3f6499;
    --orange:#e8772e; --orange-l:#f59e42; --orange-d:#cf6320;
    --tint:#fdf3e9; --tint-line:#f6d9bd;
    --green:#16a34a; --green-d:#15803d; --amber:#f59e0b; --gray:#94a3b8; --red:#ef4444;
    --ring:rgba(31,58,95,.16);
    --shadow-card:0 1px 2px rgba(22,36,63,.05), 0 14px 36px -18px rgba(22,36,63,.22);
    --shadow-navy:0 8px 22px -8px rgba(31,58,95,.5);
    --shadow-orange:0 8px 22px -8px rgba(232,119,46,.5);
    --r:20px;
    --fnum:"Plus Jakarta Sans","Noto Sans JP",sans-serif;
    /* 状態カラー（後から状態を増やすときはここと STATUS を合わせる） */
    --c-watch:#64748b; --c-watch-bg:#eef1f5;
    --c-candidate:#cf6320; --c-candidate-bg:#fdf0e4;
    --c-holding:#15803d; --c-holding-bg:#dcfce7;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;
    font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;
    color:var(--ink);font-size:15px;line-height:1.55;letter-spacing:.01em;
    padding-bottom:48px;
    background:
      radial-gradient(900px 480px at 105% -8%, rgba(232,119,46,.16), transparent 60%),
      radial-gradient(760px 420px at -12% 4%, rgba(31,58,95,.12), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  .num{font-family:var(--fnum);font-variant-numeric:tabular-nums;letter-spacing:0}

  /* ---- ヘッダー ---- */
  header{
    color:#fff;padding:20px 18px 22px;position:sticky;top:0;z-index:10;
    background:linear-gradient(135deg,#15294a 0%,#1f3a5f 50%,#2f4f7a 100%);
    border-radius:0 0 26px 26px;
    box-shadow:0 10px 30px -12px rgba(21,41,74,.6);
    overflow:hidden;
  }
  header::after{
    content:"";position:absolute;right:-40px;top:-60px;width:200px;height:200px;
    background:radial-gradient(circle,rgba(232,119,46,.28),transparent 70%);pointer-events:none;
  }
  .h-title{font-size:20px;font-weight:800;margin:0 0 14px;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
  /* ヘッダー内サマリー（状態別カウント） */
  .hsum{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .hcell{
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
    border-radius:12px;padding:9px 6px;text-align:center;
  }
  .hcell .hc-n{font-family:var(--fnum);font-weight:800;font-size:20px;line-height:1.1}
  .hcell .hc-l{font-size:10px;opacity:.85;margin-top:2px}
  .hcell.watch .hc-n{color:#cbd5e1}
  .hcell.candidate .hc-n{color:var(--orange-l)}
  .hcell.holding .hc-n{color:#86efac}
  .hcell.buy .hc-n{color:#fde047}

  main{max-width:560px;margin:0 auto;padding:18px 16px}

  /* ---- カード ---- */
  .card{
    background:var(--card);border:1px solid rgba(236,228,212,.9);
    border-radius:var(--r);padding:20px;margin-bottom:16px;
    box-shadow:var(--shadow-card);
  }
  .card h2{
    font-size:12px;margin:0 0 16px;color:var(--sub);font-weight:700;
    letter-spacing:.08em;display:flex;align-items:center;gap:7px;
  }
  .card h2::before{content:"";width:4px;height:14px;border-radius:3px;background:linear-gradient(var(--navy-l),var(--navy-d))}
  .card h2 .h2-cancel{margin-left:auto;font-size:11px;color:var(--orange-d);font-weight:700;cursor:pointer;letter-spacing:0}

  /* ---- 入力フォーム ---- */
  .entry-form{display:flex;flex-wrap:wrap;gap:9px;align-items:stretch}
  .entry-form input,.entry-form textarea{
    border:1.5px solid var(--line);border-radius:12px;padding:11px 12px;font-size:15px;
    background:#fffdf7;color:var(--ink);transition:border-color .15s,box-shadow .15s,background .15s;width:100%;
    font-family:inherit;
  }
  .entry-form input:focus,.entry-form textarea:focus{outline:none;border-color:var(--orange-l);background:#fff;box-shadow:0 0 0 4px rgba(232,119,46,.14)}
  .ef-row{display:flex;gap:9px;flex:1 1 100%}
  .ef-code{flex:1 1 36%;font-family:var(--fnum);font-variant-numeric:tabular-nums}
  .ef-name{flex:1 1 64%}
  .ef-num{flex:1 1 0;text-align:right;font-family:var(--fnum)}
  .ef-lab{flex:1 1 100%;font-size:11px;color:var(--sub);font-weight:600;margin:2px 0 -5px}
  .ef-memo{flex:1 1 100%;resize:vertical;min-height:64px;line-height:1.5}

  /* 状態セグメント */
  .seg{display:flex;gap:8px;flex:1 1 100%}
  .seg button{
    flex:1;border:1.5px solid var(--line);background:#fffdf7;color:var(--sub);
    border-radius:12px;padding:12px 6px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:transform .12s,background .15s,color .15s,box-shadow .15s,border-color .15s;
  }
  .seg button:active{transform:scale(.98)}
  .seg button.on[data-status="watch"]{background:linear-gradient(135deg,#475569,#64748b);color:#fff;border-color:transparent;box-shadow:0 8px 22px -8px rgba(71,85,105,.5)}
  .seg button.on[data-status="candidate"]{background:linear-gradient(135deg,var(--orange-d),var(--orange-l));color:#fff;border-color:transparent;box-shadow:var(--shadow-orange)}
  .seg button.on[data-status="holding"]{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;border-color:transparent;box-shadow:0 8px 22px -8px rgba(34,197,94,.5)}

  .btn{
    width:100%;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:800;
    letter-spacing:.02em;color:#fff;cursor:pointer;margin-top:12px;
    background:linear-gradient(135deg,var(--orange-d),var(--orange-l));
    box-shadow:var(--shadow-orange);transition:transform .12s,box-shadow .15s,filter .15s;
  }
  .btn:active{transform:translateY(1px) scale(.99);filter:brightness(.96)}
  .btn.navy{background:linear-gradient(135deg,var(--navy-d),var(--navy-l));box-shadow:var(--shadow-navy)}

  /* ---- フィルタ ---- */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .filters button{
    border:1.5px solid var(--line);background:#fffdf7;color:var(--sub);
    border-radius:99px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:all .15s;
  }
  .filters button.on{background:var(--navy);color:#fff;border-color:transparent;box-shadow:var(--shadow-navy)}
  .filters button .fcount{font-family:var(--fnum);opacity:.7;margin-left:4px;font-size:11px}

  /* ---- 銘柄カード ---- */
  .stock{
    border:1px solid var(--line);border-left:5px solid var(--gray);
    border-radius:15px;padding:14px;margin-bottom:11px;background:var(--bg);
    transition:box-shadow .15s;
  }
  .stock.s-watch{border-left-color:var(--c-watch)}
  .stock.s-candidate{border-left-color:var(--c-candidate)}
  .stock.s-holding{border-left-color:var(--c-holding)}
  .stock.is-buy{background:linear-gradient(180deg,#f0fbf3,#fffdf7);border-color:#bbf7d0}
  .st-top{display:flex;align-items:flex-start;gap:10px}
  .st-id{flex:1;min-width:0}
  .st-code{font-family:var(--fnum);font-weight:800;font-size:13px;color:var(--sub);letter-spacing:.04em}
  .st-name{font-weight:800;font-size:17px;line-height:1.25;margin-top:1px;word-break:break-word}
  .st-badge{
    flex:0 0 auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;line-height:1.6;white-space:nowrap;
  }
  .st-badge.watch{background:var(--c-watch-bg);color:var(--c-watch)}
  .st-badge.candidate{background:var(--c-candidate-bg);color:var(--c-candidate)}
  .st-badge.holding{background:var(--c-holding-bg);color:var(--c-holding)}

  /* 株価 vs 目標買い値 */
  .st-price{display:flex;align-items:stretch;gap:8px;margin-top:12px}
  .pcell{flex:1;background:#fffdf7;border:1px solid var(--line);border-radius:11px;padding:8px 10px}
  .pcell .pc-l{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:2px}
  .pcell .pc-v{font-family:var(--fnum);font-weight:800;font-size:18px;font-variant-numeric:tabular-nums}
  .pcell .pc-v small{font-size:11px;color:var(--sub);font-weight:600;margin-left:1px}
  .pcell .pc-v.muted{color:var(--gray);font-size:13px}
  .pcell.target{background:var(--tint);border-color:var(--tint-line)}
  .st-cmp{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-width:88px;border-radius:11px;padding:6px 8px;text-align:center;
  }
  .st-cmp .cmp-tag{font-size:12px;font-weight:800;line-height:1.2}
  .st-cmp .cmp-sub{font-size:10px;font-weight:600;margin-top:2px;font-family:var(--fnum)}
  .st-cmp.buy{background:#dcfce7;color:var(--green-d)}
  .st-cmp.above{background:#eef1f5;color:#64748b}
  .st-cmp.na{background:#f1f5f9;color:#94a3b8}

  /* PER / PBR ＋ メモ */
  .st-metrics{display:flex;gap:8px;margin-top:10px}
  .mchip{font-size:11px;color:var(--sub);background:#fffdf7;border:1px solid var(--line);border-radius:8px;padding:4px 9px}
  .mchip b{font-family:var(--fnum);color:var(--ink);font-weight:800;margin-left:3px}
  .st-memo{font-size:13px;color:#475569;margin-top:10px;white-space:pre-wrap;word-break:break-word;line-height:1.5}
  .st-actions{display:flex;gap:8px;margin-top:12px}
  .st-actions button{
    flex:1;border:1.5px solid var(--line);background:#fffdf7;color:var(--sub);
    border-radius:10px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .st-actions button.edit:active{background:#eef1f5}
  .st-actions button.del{color:var(--red);border-color:#f3d4d4}
  .st-actions button.del:active{background:#fdecec}

  .empty-note{color:var(--sub);font-size:13px;padding:22px 0;text-align:center;line-height:1.7}

  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:var(--sub)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

  .foot{text-align:center;font-size:11px;color:var(--sub);margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<header>
  <h1 class="h-title">📈 株ウォッチリスト</h1>
  <div class="hsum">
    <div class="hcell watch"><div class="hc-n" id="cWatch">0</div><div class="hc-l">watch</div></div>
    <div class="hcell candidate"><div class="hc-n" id="cCand">0</div><div class="hc-l">買い候補</div></div>
    <div class="hcell holding"><div class="hc-n" id="cHold">0</div><div class="hc-l">保有</div></div>
    <div class="hcell buy"><div class="hc-n" id="cBuy">0</div><div class="hc-l">買い場🎯</div></div>
  </div>
</header>

<main>
  <!-- 銘柄を追加 / 編集 -->
  <div class="card">
    <h2 id="formTitle">銘柄を追加<span class="h2-cancel" id="cancelEdit" style="display:none">編集をやめる ×</span></h2>
    <div class="entry-form">
      <div class="ef-row">
        <input type="text" inputmode="numeric" class="ef-code" id="inCode" placeholder="コード(例 5280)" autocomplete="off">
        <input type="text" class="ef-name" id="inName" placeholder="会社名" autocomplete="off">
      </div>
      <div class="seg" id="statusSeg">
        <button type="button" data-status="watch" class="on">watch</button>
        <button type="button" data-status="candidate">買い候補</button>
        <button type="button" data-status="holding">保有</button>
      </div>
      <div class="ef-lab">現在株価 / 目標買い値（円）</div>
      <div class="ef-row">
        <input type="text" inputmode="decimal" lang="en" class="ef-num" id="inPrice" placeholder="現在株価" autocomplete="off">
        <input type="text" inputmode="decimal" lang="en" class="ef-num" id="inTarget" placeholder="目標買い値" autocomplete="off">
      </div>
      <div class="ef-lab">PER / PBR（倍）</div>
      <div class="ef-row">
        <input type="text" inputmode="decimal" lang="en" class="ef-num" id="inPer" placeholder="PER" autocomplete="off">
        <input type="text" inputmode="decimal" lang="en" class="ef-num" id="inPbr" placeholder="PBR" autocomplete="off">
      </div>
      <textarea class="ef-memo" id="inMemo" placeholder="四季報メモ・注目理由（自由記入）"></textarea>
    </div>
    <button class="btn" id="addBtn">＋ 追加する</button>
  </div>

  <!-- 一覧 -->
  <div class="card">
    <h2>ウォッチ一覧</h2>
    <div class="filters" id="filters"></div>
    <div id="stockList"></div>
    <div class="legend">
      <span><i style="background:var(--c-watch)"></i>watch</span>
      <span><i style="background:var(--c-candidate)"></i>買い候補</span>
      <span><i style="background:var(--c-holding)"></i>保有</span>
      <span><i style="background:#22c55e"></i>買い場（現在値 ≦ 目標）</span>
    </div>
  </div>

  <button class="btn navy" id="saveNow">☁️ データを保存する</button>
  <p class="foot" id="syncStatus">読み込み中…</p>
  <p class="foot">データはこの端末に保存され、設定したGoogleスプレッドシートにも同期されます。スマホ⇔Chromebookで同じリストが見られます。</p>
</main>

<script>
"use strict";
/* ============================================================
   設定（状態や項目を増やすときはここを編集）
   ============================================================ */
// 状態の定義。key の順番がフォーム/フィルタの並び順になる。
// 後から状態を足す場合は、この配列と :root の --c-* / CSS を増やすだけ。
const STATUS = [
  { key:'watch',     label:'watch'   },
  { key:'candidate', label:'買い候補' },
  { key:'holding',   label:'保有'    },
];
const STATUS_KEYS = STATUS.map(s=>s.key);
const STATUS_LABEL = Object.fromEntries(STATUS.map(s=>[s.key,s.label]));

/* ============================================================
   Googleスプレッドシート連携（Apps Script Web App）
   ↓ stock-watchlist.gs をデプロイしたら、ここに /exec のURLを貼る
   未設定（PASTE_…のまま）でもローカル保存だけで動きます。
   ※ ランニングログとは別のスプレッドシート／GASを使ってください。
   ============================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycbxtkp50LYKaEfRZgvNqKVnuxv_-ioAzkJIGS1P7a0SA4kl_4MLV61t3lHboUbho3B0/exec';
const CACHE_KEY = 'stock_watchlist_cache_v1';   // 起動時に即表示するためのローカルキャッシュ
const cloudEnabled = /^https:\/\/script\.google\.com\//.test(API_URL);

/* ============================================================
   ユーティリティ
   ============================================================ */
const escapeHtml = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad2 = n => String(n).padStart(2,'0');
// 全角数字・全角ピリオド → 半角に変換し、数字と小数点だけ残す
function toHalfNum(s){
  return String(s)
    .replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[．。]/g,'.')
    .replace(/[^0-9.]/g,'');
}
// 数値 → 円表示（整数は桁区切り、小数があればそのまま）。0/未入力は null を返す想定
function num(v){ const n=+v; return isFinite(n)?n:0; }
function fmtMoney(n){
  if(!isFinite(n)||n<=0) return '—';
  return (Math.round(n*100)/100).toLocaleString('en-US');
}
function fmtRatio(n){
  if(!isFinite(n)||n<=0) return '—';
  return String(Math.round(n*100)/100);
}

/* ============================================================
   状態
   ============================================================ */
let DB = base();
let loaded = false;       // 保存を許可してよいか
let localEdited = false;  // 起動後にユーザーが編集したか
let editingId = null;     // 編集中の銘柄ID（null なら新規追加）
let activeFilter = 'all'; // 一覧の絞り込み
function base(){ return { stocks: [] }; }

function normalize(d){
  if(!d || typeof d!=='object' || Array.isArray(d)) d = base();
  if(!Array.isArray(d.stocks)) d.stocks = [];
  d.stocks = d.stocks.filter(s=>s && typeof s==='object').map(s=>({
    id:     s.id || (Date.now()+'-'+Math.random().toString(36).slice(2,8)),
    code:   String(s.code||'').trim(),
    name:   String(s.name||'').trim(),
    status: STATUS_KEYS.includes(s.status) ? s.status : 'watch',
    price:  num(s.price),
    target: num(s.target),
    per:    num(s.per),
    pbr:    num(s.pbr),
    memo:   String(s.memo||''),
  })).filter(s=>s.code || s.name);   // コードか会社名のどちらかがあれば有効
  return d;
}

/* ============================================================
   ローカルキャッシュ ＋ クラウド保存（running-log と同型）
   ============================================================ */
function setStatus(msg){ const el=document.getElementById('syncStatus'); if(el) el.textContent=msg; }
function nowStr(){ const d=new Date(); return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
function writeCache(){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify(DB)); }catch(e){} }

let saveTimer=null;
function save(){
  localEdited = true;
  writeCache();                 // まずローカルへ即保存（オフラインでも消えない）
  if(!cloudEnabled){ setStatus(`この端末に保存しました ✓ (${nowStr()})`); return; }
  if(!loaded){ return; }        // クラウドの初期読込前は送信しない
  setStatus('未保存…');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(cloudSave,800);   // 連続入力をまとめて送信
}
function cloudSave(){
  clearTimeout(saveTimer);
  writeCache();
  if(!cloudEnabled || !loaded){ return; }
  setStatus('スプレッドシートに保存中…');
  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // CORSプリフライト回避
    body:JSON.stringify(DB)
  })
  .then(r=>r.text())
  .then(()=>{ localEdited=false; setStatus(`スプレッドシートに保存しました ✓ (${nowStr()})`); })
  .catch(()=>setStatus('⚠️ 保存に失敗しました。通信を確認し「データを保存する」を押してください'));
}

async function init(){
  // 1) ローカルキャッシュがあれば即表示
  let hasCache=false;
  try{
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      DB=normalize(JSON.parse(cached));
      loaded=true; hasCache=true;
      render();
      setStatus(cloudEnabled?'前回のデータを表示中…最新を確認しています':`この端末に保存済み`);
    }
  }catch(e){}
  if(!hasCache){ render(); }

  // クラウド未設定ならローカル専用で終了
  if(!cloudEnabled){
    loaded=true;
    if(!hasCache) setStatus('ローカル保存モード（GASのURL未設定）');
    return;
  }

  // 2) バックグラウンドでスプレッドシートの最新を取得
  if(!hasCache) setStatus('スプレッドシートから読み込み中…');
  try{
    const res=await fetch(API_URL,{method:'GET',cache:'no-store'});
    const txt=await res.text();
    const data= txt && txt.trim() ? JSON.parse(txt) : base();
    if(!localEdited){ DB=normalize(data); render(); }
    loaded=true; writeCache();
    setStatus(`スプレッドシートと同期済み ✓ (${nowStr()})`);
  }catch(e){
    if(hasCache){
      setStatus('⚠️ オフライン：前回のデータを表示中（オンライン復帰後に保存されます）');
    }else{
      loaded=false;
      setStatus('⚠️ 読み込み失敗：通信を確認して再読み込みしてください（保存は無効）');
    }
  }
}

/* ============================================================
   買い場判定（現在株価が目標買い値を下回っているか）
   ============================================================ */
function buyState(s){
  if(s.price>0 && s.target>0){
    const diff = s.price - s.target;          // マイナス = 目標より安い = 買い場
    const pct  = diff / s.target * 100;
    return { kind: diff<=0 ? 'buy' : 'above', diff, pct };
  }
  return { kind:'na', diff:0, pct:0 };
}

/* ============================================================
   データ操作
   ============================================================ */
function readForm(){
  return {
    code:   document.getElementById('inCode').value.trim(),
    name:   document.getElementById('inName').value.trim(),
    status: selectedStatus(),
    price:  num(toHalfNum(document.getElementById('inPrice').value)),
    target: num(toHalfNum(document.getElementById('inTarget').value)),
    per:    num(toHalfNum(document.getElementById('inPer').value)),
    pbr:    num(toHalfNum(document.getElementById('inPbr').value)),
    memo:   document.getElementById('inMemo').value.trim(),
  };
}
function clearForm(){
  ['inCode','inName','inPrice','inTarget','inPer','inPbr','inMemo'].forEach(id=>document.getElementById(id).value='');
  setStatusSeg('watch');
}
function submitForm(){
  const f=readForm();
  if(!f.code && !f.name){ document.getElementById('inCode').focus(); return; }
  if(editingId){
    const st=DB.stocks.find(x=>x.id===editingId);
    if(st) Object.assign(st,f);
    exitEdit();
  }else{
    DB.stocks.push({ id: Date.now()+'-'+Math.random().toString(36).slice(2,8), ...f });
  }
  clearForm();
  save(); render();
  document.getElementById('inCode').focus();
}
function startEdit(id){
  const s=DB.stocks.find(x=>x.id===id); if(!s) return;
  editingId=id;
  document.getElementById('inCode').value   = s.code;
  document.getElementById('inName').value   = s.name;
  document.getElementById('inPrice').value  = s.price>0 ? s.price : '';
  document.getElementById('inTarget').value = s.target>0 ? s.target : '';
  document.getElementById('inPer').value    = s.per>0 ? s.per : '';
  document.getElementById('inPbr').value    = s.pbr>0 ? s.pbr : '';
  document.getElementById('inMemo').value   = s.memo;
  setStatusSeg(s.status);
  document.getElementById('formTitle').firstChild.textContent='銘柄を編集';
  document.getElementById('cancelEdit').style.display='inline';
  document.getElementById('addBtn').textContent='✓ 更新する';
  window.scrollTo({top:0,behavior:'smooth'});
}
function exitEdit(){
  editingId=null;
  clearForm();
  document.getElementById('formTitle').firstChild.textContent='銘柄を追加';
  document.getElementById('cancelEdit').style.display='none';
  document.getElementById('addBtn').textContent='＋ 追加する';
}
function delStock(id){
  DB.stocks = DB.stocks.filter(s=>s.id!==id);
  if(editingId===id) exitEdit();
  save(); render();
}

/* ============================================================
   描画
   ============================================================ */
function renderSummary(){
  const c={watch:0,candidate:0,holding:0,buy:0};
  DB.stocks.forEach(s=>{
    c[s.status]=(c[s.status]||0)+1;
    if(buyState(s).kind==='buy') c.buy++;
  });
  document.getElementById('cWatch').textContent=c.watch;
  document.getElementById('cCand').textContent=c.candidate;
  document.getElementById('cHold').textContent=c.holding;
  document.getElementById('cBuy').textContent=c.buy;
}

function renderFilters(){
  const box=document.getElementById('filters');
  const counts={all:DB.stocks.length};
  STATUS_KEYS.forEach(k=>counts[k]=DB.stocks.filter(s=>s.status===k).length);
  const tabs=[{key:'all',label:'すべて'}, ...STATUS];
  box.innerHTML=tabs.map(t=>
    `<button data-filter="${t.key}" class="${activeFilter===t.key?'on':''}">`+
    `${escapeHtml(t.label)}<span class="fcount">${counts[t.key]||0}</span></button>`
  ).join('');
  box.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{
    activeFilter=b.dataset.filter; renderFilters(); renderList();
  });
}

function renderList(){
  const box=document.getElementById('stockList');
  box.innerHTML='';
  let list=[...DB.stocks];
  if(activeFilter!=='all') list=list.filter(s=>s.status===activeFilter);
  // 並び：買い場を上に、その後コード順
  list.sort((a,b)=>{
    const ba=buyState(a).kind==='buy'?0:1, bb=buyState(b).kind==='buy'?0:1;
    if(ba!==bb) return ba-bb;
    return String(a.code).localeCompare(String(b.code),'en',{numeric:true});
  });
  if(!list.length){
    box.innerHTML = DB.stocks.length
      ? '<div class="empty-note">この状態の銘柄はありません。</div>'
      : '<div class="empty-note">まだ銘柄がありません。<br>上の「追加する」から登録してください。</div>';
    return;
  }
  list.forEach(s=>{
    const bs=buyState(s);
    let cmpHtml;
    if(bs.kind==='buy'){
      const amt = bs.diff===0 ? '目標ぴったり' : `目標より ${fmtMoney(-bs.diff)}円 安い`;
      cmpHtml=`<div class="st-cmp buy"><div class="cmp-tag">🎯 買い場</div><div class="cmp-sub">${amt}</div></div>`;
    }else if(bs.kind==='above'){
      cmpHtml=`<div class="st-cmp above"><div class="cmp-tag">あと ${fmtMoney(bs.diff)}円</div><div class="cmp-sub">+${(Math.round(bs.pct*10)/10)}%</div></div>`;
    }else{
      cmpHtml=`<div class="st-cmp na"><div class="cmp-tag">—</div><div class="cmp-sub">価格未入力</div></div>`;
    }
    const metrics=[];
    if(s.per>0) metrics.push(`<span class="mchip">PER<b>${fmtRatio(s.per)}</b></span>`);
    if(s.pbr>0) metrics.push(`<span class="mchip">PBR<b>${fmtRatio(s.pbr)}</b></span>`);

    const row=document.createElement('div');
    row.className=`stock s-${s.status}`+(bs.kind==='buy'?' is-buy':'');
    row.innerHTML=
      `<div class="st-top">`+
        `<div class="st-id">`+
          (s.code?`<div class="st-code">${escapeHtml(s.code)}</div>`:'')+
          `<div class="st-name">${escapeHtml(s.name||'（名称未設定）')}</div>`+
        `</div>`+
        `<span class="st-badge ${s.status}">${escapeHtml(STATUS_LABEL[s.status])}</span>`+
      `</div>`+
      `<div class="st-price">`+
        `<div class="pcell"><div class="pc-l">現在株価</div>`+
          `<div class="pc-v${s.price>0?'':' muted'}">${s.price>0?fmtMoney(s.price)+'<small>円</small>':'未入力'}</div></div>`+
        `<div class="pcell target"><div class="pc-l">目標買い値</div>`+
          `<div class="pc-v${s.target>0?'':' muted'}">${s.target>0?fmtMoney(s.target)+'<small>円</small>':'未入力'}</div></div>`+
        cmpHtml+
      `</div>`+
      (metrics.length?`<div class="st-metrics">${metrics.join('')}</div>`:'')+
      (s.memo?`<div class="st-memo">${escapeHtml(s.memo)}</div>`:'')+
      `<div class="st-actions">`+
        `<button class="edit" data-edit="${s.id}">✎ 編集</button>`+
        `<button class="del" data-del="${s.id}">🗑 削除</button>`+
      `</div>`;
    box.appendChild(row);
  });
  box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>startEdit(b.dataset.edit));
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const s=DB.stocks.find(x=>x.id===b.dataset.del);
    if(confirm(`「${s?(s.name||s.code):'この銘柄'}」を削除しますか？`)) delStock(b.dataset.del);
  });
}

function render(){
  renderSummary();
  renderFilters();
  renderList();
}

/* ============================================================
   イベント
   ============================================================ */
// 状態セグメント
function selectedStatus(){ const b=document.querySelector('#statusSeg button.on'); return b?b.dataset.status:'watch'; }
function setStatusSeg(key){
  document.querySelectorAll('#statusSeg button').forEach(b=>b.classList.toggle('on',b.dataset.status===key));
}
document.querySelectorAll('#statusSeg button').forEach(b=>b.onclick=()=>setStatusSeg(b.dataset.status));

// 数値欄：全角で打たれても即座に半角へ変換
['inPrice','inTarget','inPer','inPbr'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    const v=toHalfNum(e.target.value);
    if(v!==e.target.value) e.target.value=v;
  });
});

document.getElementById('addBtn').onclick=submitForm;
document.getElementById('cancelEdit').onclick=exitEdit;
document.getElementById('saveNow').onclick=()=>{
  if(cloudEnabled && !loaded){ setStatus('まだ読み込めていません。再読み込みしてください'); return; }
  cloudEnabled ? cloudSave() : save();
};

init();
</script>
</body>
</html>
